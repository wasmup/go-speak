<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">

    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            font-family: sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        #topbar {
            flex: 0 0 auto;
            background: #eee;
            padding: 10px;
            border-bottom: 1px solid #ccc;

            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        #progressRow {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            background: #f8f8f8;
            border-bottom: 1px solid #ddd;
        }

        #progress {
            flex: 1 1 auto;
            height: 18px;
        }

        #progressText {
            min-width: 130px;
            font-size: 14px;
            color: #333;
            text-align: right;
        }

        #text {
            flex: 1 1 auto;
            width: 100%;
            box-sizing: border-box;
            border: none;
            resize: none;
            padding: 12px;
            font-family: monospace;
            font-size: 16px;
            outline: none;
        }

        button {
            font-size: 16px;
            padding: 6px 14px;
            cursor: pointer;
        }

        label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }

        input[type="number"] {
            width: 80px;
            padding: 5px;
            font-size: 14px;
        }

        #currentRow {
            flex: 0 0 auto;
            padding: 10px;
            background: #fafafa;
            border-bottom: 1px solid #ddd;
        }

        #currentLabel {
            font-size: 13px;
            color: #666;
            margin-bottom: 4px;
        }

        #currentSentence {
            font-size: 32px;
            font-weight: 500;
            color: #222;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

    <div id="topbar">
        <button onclick="play()">▶ Play</button>
        <button onclick="stop()">■ Stop</button>

        <label>
            Speaker id:
            <input id="sid" type="number" value="{{ .SID }}" min="0" step="1" max="904" oninput="updateSID()">
        </label>

        <label>
            Speed:
            <input id="speed" type="number" value="{{ .Speed }}" min="0.2" step="0.05" max="4" oninput="updateSpeed()">
        </label>

        <label>
            Exclude chars:
            <input id="exclude" type="text" value="*#">
        </label>

    </div>

    <div id="currentRow">
        <div id="currentLabel">Now playing:</div>
        <div id="currentSentence"></div>
    </div>


    <div id="progressRow">
        <progress id="progress" value="0" max="100"></progress>
        <span id="progressText">0 / 0 chunks</span>
    </div>

    <textarea id="text">{{ .StartupText }}</textarea>

    <script>
        let progressTimer = null



        function stop() {
            fetch("/stop", {
                method: "POST"
            }).then(() => {
                updateProgress()
            })
        }

        function startProgressPolling() {
            if (progressTimer !== null) {
                clearInterval(progressTimer)
            }

            updateProgress()

            progressTimer = setInterval(updateProgress, 300)
        }

        function stopProgressPolling() {
            if (progressTimer !== null) {
                clearInterval(progressTimer)
                progressTimer = null
            }
        }

        function updateProgress() {
            fetch("/progress")
                .then(resp => resp.json())
                .then(p => {

                    const progress = document.getElementById("progress")
                    const progressText = document.getElementById("progressText")
                    const currentSentence = document.getElementById("currentSentence")

                    progress.max = 100
                    progress.value = p.percent

                    progressText.textContent =
                        `${p.done} / ${p.total} chunks (${p.percent}%)`

                    currentSentence.textContent = p.current || ""

                    if (!p.playing) {
                        stopProgressPolling()
                    }
                })
                .catch(() => {
                    stopProgressPolling()
                })
        }


        function updateSID() {

            const sid = document.getElementById("sid").value

            fetch("/set_sid", {
                method: "POST",
                body: new URLSearchParams({
                    sid: sid
                })
            })
        }

        function updateSpeed() {

            const speed = document.getElementById("speed").value

            fetch("/set_speed", {
                method: "POST",
                body: new URLSearchParams({
                    speed: speed
                })
            })
        }

        function play() {
            const text = document.getElementById("text").value
            const exclude = document.getElementById("exclude").value

            fetch("/play", {
                method: "POST",
                body: new URLSearchParams({
                    text: text,
                    exclude: exclude
                })
            })
                .then(resp => {
                    if (!resp.ok) {
                        throw new Error("play failed")
                    }
                    return resp.json()
                })
                .then(data => {
                    document.getElementById("text").value = data.text
                    startProgressPolling()
                })
                .catch(() => {
                    stopProgressPolling()
                })
        }


        updateProgress()
    </script>

</body>

</html>
